<!DOCTYPE html>
<html>
    <head>
    </head>
    <body>
        <center>
        <h1>Student Confirmation Form</h1>
        </center>
        <label>Student Name</label>
        <input type="text" name = "studentname" required><br><br>
        <label>Email</label>
        <input type="email" name = "email" required><br><br>
        <label>Preferred Internship Type</label>
        <input type="radio" name = "internshiptype" value = "On-Site">
        <label>On-Site</label>
        <input type = "radio" name = "internshiptype" value = "Remote">
        <label>Remote</label><br><br>
        <label>Internship Duration</label>
        <select name="duration">
            <option value="6 Weeks">6 Weeks</option>
            <option value="3 Months">3 Months</option>
        </select><br><br>
        <label>Skill of Interest</label><br>
        <input type="checkbox" name="skills" value="Web Development">
        <label>Web Development</label><br>
        <input type="checkbox" name="skills" value="Data Analysis">
        <label>Data Analysis</label><br>
        <input type="checkbox" name="skills" value="Mobile Apps">
        <label>Mobile Apps</label><br><br>
        <input type="submit" name="Submit">
    </body>
</html>
